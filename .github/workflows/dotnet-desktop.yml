name: .NET Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

- name: Restore
  run: dotnet restore POEPART1/POEPART1/POEPART1.csproj

- name: Build
  run: dotnet build POEPART1/POEPART1/POEPART1.csproj --no-restore
